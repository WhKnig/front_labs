<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторная работа 4: SCSS/SASS</title>
    <link rel="stylesheet" href="numbers.css">
    <link rel="stylesheet" href="layout.css">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 20px; background: #f0f2f5; }
        h1 { text-align: center; color: #333; }
        .task-section { margin-bottom: 50px; }
        .nav-links { text-align: center; margin-bottom: 20px; }
        .nav-links a { margin: 0 10px; text-decoration: none; color: #007bff; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Лабораторная работа 4</h1>
    
    <div class="nav-links">
        <a href="#task2">Задание 2 (1-100)</a>
        <a href="#task3">Задание 3 (Макет)</a>
    </div>

    <section id="task2" class="task-section">
        <h2>Задание 2: Список чисел 1-100 с динамическим цветом</h2>
        <div class="numbers-container" id="numbers-grid">
            <!-- Generated by script for convenience, styled by SCSS loops -->
        </div>
    </section>

    <hr>

    <section id="task3" class="task-section">
        <h2>Задание 3: Верстка по макету</h2>
        <div class="layout-wrapper">
            <header class="main-header">
                <div class="logo">Логотип</div>
                <nav class="main-nav">
                    <ul>
                        <li><a href="#">Домой</a></li>
                        <li><a href="#">Товары</a></li>
                        <li><a href="#">Услуги</a></li>
                        <li><a href="#">О нас</a></li>
                        <li><a href="#">Контакты</a></li>
                    </ul>
                </nav>
            </header>

            <main class="content">
                <section class="feature-box">
                    Характеристика
                </section>
                
                <section class="columns-container">
                    <div class="column">Колонка 1</div>
                    <div class="column">Колонка 2</div>
                    <div class="column">Колонка 3</div>
                </section>
            </main>

            <footer class="main-footer">
                © МЕРНИ 2023
            </footer>
        </div>
    </section>

    <script>
        // Генерируем числа для Задания 2
        const grid = document.getElementById('numbers-grid');
        for (let i = 1; i <= 100; i++) {
            const div = document.createElement('div');
            div.className = `number n-${i}`;
            div.textContent = i;
            grid.appendChild(div);
        }
    </script>
</body>
</html>
