<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeScript Laboratory Results</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }


        #console-output {
            width: 100%;
            max-width: 900px;
            background: #010409;
            border: 1px solid #30363d;
            border-radius: 0 0 8px 8px;
            padding: 20px;
            box-sizing: border-box;
            white-space: pre-wrap;
            color: #7ee787;
            line-height: 1.5;
            font-size: 14px;
            min-height: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .label {
            margin-bottom: 10px;
            font-size: 0.8rem;
            color: #8b949e;
        }
    </style>
</head>

<body>
    <div id="console-output">Инициализация системы...</div>

    <script type="module" src="./dist/index.js"></script>
</body>

</html>
