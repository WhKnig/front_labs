<!DOCTYPE html>
<html lang="ru">
<head>

    body { background: white; padding: 40px; color: black; }

</head>
<body>
  <div class="task-content" style="max-width: 800px; margin: 0 auto;">

    <table>
      <tr>
        <th colspan="2">Информация</th>
      </tr>
      <tr>
        <td>Старая цена: <del>1000 ₽</del></td>
        <td>Новая цена: 500 ₽</td>
      </tr>
    </table>
    <p style="margin-top: 50px;"><a href="index.html">← Вернуться к списку</a></p>
